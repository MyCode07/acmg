<section class="section request" id="request">
    <div class="section__container _container">
        <div class="section__body">
            <div class="section__title">
                <h2>Оставить заявку</h2>
            </div>
            <div class="form">
                <form action="#">
                    <div class="form__row grid grid-4">
                        <div class="form__item">
                            <input type="text" placeholder="Ваше имя">
                        </div>
                        <div class="form__item">
                            <input type="text" placeholder="+7 (___) ___-__-__ *" class="_mask-phone">
                        </div>
                        <div class="form__item">
                            <input type="email" placeholder="Email">
                        </div>
                        <button class="_btn _btn-accent">Отправить</button>
                    </div>
                    <label class="form__privacy" for="accept">
                        <span></span>
                        <input type="checkbox" name="accept" id="accept">
                        <p>Я согласен с <a href="/privacy-policy/" target="_blank">Политикой
                                конфиденциальности и
                                обработкой персональных данных</a></p>
                    </label>
                </form>
            </div>
        </div>
    </div>
</section>
